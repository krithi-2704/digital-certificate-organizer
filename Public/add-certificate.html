<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Certificate - Digital Certificate Organizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <div class="brand-icon">
                    <i class="fas fa-certificate"></i>
                </div>
                <span class="brand-text">Digital <span class="fw-bold">Certificate Organizer</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fas fa-th-large me-2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="add-certificate.html">
                            <i class="fas fa-plus-circle me-2"></i>Add Certificate
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container form-container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card" data-aos="fade-up">
                    <div class="form-header">
                        <h2>Add New Certificate</h2>
                        <p>Fill in the details below to add a new certificate</p>
                    </div>

                    <form id="certificateForm" enctype="multipart/form-data">
                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-tag label-icon"></i>
                                Certificate Title
                            </label>
                            <input type="text" class="form-control form-control-lg" id="title" 
                                   placeholder="e.g., AWS Certified Cloud Practitioner" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-building label-icon"></i>
                                Issuing Organization
                            </label>
                            <input type="text" class="form-control form-control-lg" id="issuer" 
                                   placeholder="e.g., Amazon Web Services" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-calendar-alt label-icon"></i>
                                Issue Date
                            </label>
                            <input type="date" class="form-control form-control-lg" id="date" 
                                   max="2026-03-14" value="2026-03-14">
                            <div class="form-hint">
                                <i class="fas fa-info-circle me-1"></i>
                                Select the date when certificate was issued
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-file-pdf label-icon"></i>
                                Certificate File
                            </label>
                            <div class="upload-area" id="uploadArea">
                                <i class="fas fa-cloud-upload-alt upload-icon"></i>
                                <h5>Drag & Drop Your File Here</h5>
                                <p class="text-muted mb-3">or</p>
                                <button type="button" class="btn btn-outline-primary browse-btn" onclick="document.getElementById('file').click()">
                                    <i class="fas fa-folder-open me-2"></i>Browse Files
                                </button>
                                <input type="file" class="d-none" id="file" accept=".pdf,.jpg,.jpeg,.png" required>
                                <div class="file-info mt-3">
                                    <i class="fas fa-info-circle me-1"></i>
                                    Supported formats: PDF, JPG, PNG
                                </div>
                                <div id="filePreview" class="mt-3"></div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary btn-submit" id="submitBtn">
                                <span class="btn-normal">
                                    <i class="fas fa-cloud-upload-alt me-2"></i>
                                    Upload Certificate
                                </span>
                                <span class="btn-loading d-none">
                                    <span class="spinner-border spinner-border-sm me-2"></span>
                                    Uploading...
                                </span>
                            </button>
                            <a href="index.html" class="btn btn-outline-secondary btn-cancel">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                    
                    <div id="message" class="mt-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
