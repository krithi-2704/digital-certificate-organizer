<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Certificate Organizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <div class="brand-icon">
                    <i class="fas fa-certificate"></i>
                </div>
                <span class="brand-text">Digital <span class="fw-bold">Certificate Organizer</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">
                            <i class="fas fa-th-large me-2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="add-certificate.html">
                            <i class="fas fa-plus-circle me-2"></i>Add Certificate
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6" data-aos="fade-right">
                    <h1 class="hero-title">Your Digital<br><span class="gradient-text">Certificate Vault</span></h1>
                    <p class="hero-subtitle">Store, manage, and access all your professional certificates in one secure place.</p>
                    <div class="hero-stats">
                        <div class="stat-item">
                            <span class="stat-number" id="total-certificates">0</span>
                            <span class="stat-label">Certificates</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="unique-issuers">0</span>
                            <span class="stat-label">Organizations</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="recent-added">0</span>
                            <span class="stat-label">This Month</span>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6" data-aos="fade-left">
                    <div class="hero-image">
                        <img src="https://illustrations.popsy.co/amber/certificate.svg" alt="Certificate" class="img-fluid">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="container main-content">
        <div class="search-filter-bar" data-aos="fade-up">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <div class="search-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="form-control search-input" id="searchInput" placeholder="Search certificates...">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="filter-options">
                        <select class="form-select filter-select" id="filterIssuer">
                            <option value="">All Organizations</option>
                        </select>
                        <select class="form-select filter-select" id="sortBy">
                            <option value="newest">Newest First</option>
                            <option value="oldest">Oldest First</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div id="certificates-container" class="row g-4 mt-2">
            <div class="col-12 text-center py-5">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p class="mt-3 text-muted">Loading your certificates...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="successToast" class="toast success-toast" role="alert">
            <div class="toast-content">
                <i class="fas fa-check-circle toast-icon"></i>
                <div class="toast-message"></div>
            </div>
        </div>
        <div id="errorToast" class="toast error-toast" role="alert">
            <div class="toast-content">
                <i class="fas fa-exclamation-circle toast-icon"></i>
                <div class="toast-message"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
